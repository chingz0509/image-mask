<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>隐私截图打码器</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    :root {
      --bg: #f5f3ee;
      --panel: #fffdf8;
      --ink: #161616;
      --muted: #6b665d;
      --line: #ded8cd;
      --line-strong: #c8bfb1;
      --accent: #0f766e;
      --accent-2: #d1495b;
      --gold: #bd8b13;
      --blue: #315c87;
      --shadow: 0 18px 50px rgba(30, 28, 24, .12);
      --radius: 8px;
      color-scheme: light;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(120deg, rgba(15, 118, 110, .08), transparent 36%),
        linear-gradient(260deg, rgba(209, 73, 91, .08), transparent 40%),
        var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .48;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 20px 28px;
      border-bottom: 1px solid rgba(222, 216, 205, .9);
      background: rgba(255, 253, 248, .72);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 220px;
    }

    .mark {
      width: 36px;
      height: 36px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--ink);
      color: var(--panel);
      box-shadow: 4px 4px 0 rgba(15, 118, 110, .32);
      flex: 0 0 auto;
    }

    .mark svg,
    .icon svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .tagline {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .privacy-note {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #24534e;
      background: rgba(15, 118, 110, .1);
      border: 1px solid rgba(15, 118, 110, .24);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      white-space: nowrap;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 18px;
      padding: 18px;
      min-height: 0;
    }

    .stage-shell,
    .side {
      background: rgba(255, 253, 248, .82);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .stage-shell {
      min-height: 640px;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .stage-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, .88);
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .file-button,
    .primary-button,
    .ghost-button,
    .icon-button {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 7px;
      border: 1px solid transparent;
      padding: 0 12px;
      font-weight: 650;
      font-size: 13px;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease;
      user-select: none;
    }

    .file-button,
    .primary-button {
      background: var(--ink);
      color: var(--panel);
      box-shadow: 0 8px 18px rgba(22, 22, 22, .18);
    }

    .file-button:hover,
    .primary-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(22, 22, 22, .22);
    }

    .ghost-button,
    .icon-button {
      background: #fffaf0;
      color: var(--ink);
      border-color: var(--line);
    }

    .ghost-button:hover,
    .icon-button:hover {
      background: #ffffff;
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }

    .danger {
      color: #922235;
      border-color: rgba(209, 73, 91, .36);
      background: rgba(209, 73, 91, .08);
    }

    .icon-button {
      width: 38px;
      padding: 0;
    }

    .icon-button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .file-input {
      display: none;
    }

    .stage {
      position: relative;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      overflow: auto;
      background:
        linear-gradient(90deg, rgba(22, 22, 22, .035) 1px, transparent 1px),
        linear-gradient(rgba(22, 22, 22, .035) 1px, transparent 1px);
      background-size: 24px 24px;
    }

    .dropzone {
      width: min(680px, 92%);
      min-height: 360px;
      border: 1.5px dashed var(--line-strong);
      border-radius: 8px;
      background: rgba(255, 253, 248, .76);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 34px;
      transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }

    .dropzone.dragging {
      border-color: var(--accent);
      background: rgba(15, 118, 110, .08);
      transform: scale(.995);
    }

    .drop-icon {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
      background: var(--ink);
      color: var(--panel);
    }

    .drop-icon svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .drop-title {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .drop-copy {
      margin: 14px auto 0;
      max-width: 460px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .canvas-wrap {
      position: relative;
      display: none;
      width: fit-content;
      max-width: 100%;
      box-shadow: 0 20px 54px rgba(20, 18, 14, .2);
      background: white;
      line-height: 0;
    }

    .image-close-button {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 8;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid rgba(22, 22, 22, .12);
      background: rgba(255, 253, 248, .9);
      color: var(--ink);
      box-shadow: 0 10px 24px rgba(20, 18, 14, .16);
      backdrop-filter: blur(10px);
      opacity: .86;
      transition: opacity .16s ease, transform .16s ease, background .16s ease;
    }

    .image-close-button:hover {
      opacity: 1;
      transform: translateY(-1px);
      background: #ffffff;
    }

    .image-close-button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    canvas {
      display: block;
      max-width: min(100%, 1100px);
      height: auto;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      transform-origin: top left;
    }

    .redaction-box,
    .drawing-box {
      position: absolute;
      border: 2px solid var(--accent-2);
      background: rgba(209, 73, 91, .13);
      min-width: 4px;
      min-height: 4px;
    }

    .redaction-box {
      pointer-events: auto;
      cursor: move;
      touch-action: none;
    }

    .redaction-box.active {
      border-color: var(--gold);
      background: rgba(189, 139, 19, .18);
      box-shadow: 0 0 0 2px rgba(255, 253, 248, .9);
    }

    .box-label {
      position: absolute;
      left: -2px;
      top: -24px;
      max-width: 220px;
      background: var(--accent-2);
      color: white;
      border-radius: 6px 6px 6px 0;
      padding: 4px 7px;
      font-size: 11px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 5px 14px rgba(209, 73, 91, .18);
    }

    .redaction-box.active .box-label {
      background: var(--gold);
      color: #1c1605;
    }

    .box-close-button {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      border: 1px solid rgba(146, 34, 53, .28);
      background: #fffdf8;
      color: #922235;
      box-shadow: 0 6px 16px rgba(146, 34, 53, .14);
      backdrop-filter: blur(10px);
      opacity: 0;
      transform: scale(.92);
      transition: opacity .16s ease, transform .16s ease, background .16s ease, color .16s ease;
    }

    .redaction-box:hover .box-close-button,
    .redaction-box.active .box-close-button {
      opacity: 1;
      transform: scale(1);
    }

    .box-close-button:hover {
      background: #fff4f6;
      border-color: rgba(146, 34, 53, .5);
    }

    .box-close-button svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      stroke-width: 2.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .resize-handle {
      position: absolute;
      width: 12px;
      height: 12px;
      border: 2px solid var(--gold);
      border-radius: 999px;
      background: #fffdf8;
      box-shadow: 0 4px 10px rgba(20, 18, 14, .18);
      opacity: 0;
      transform: translate(-50%, -50%) scale(.86);
      transition: opacity .16s ease, transform .16s ease;
    }

    .redaction-box:hover .resize-handle,
    .redaction-box.active .resize-handle {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .resize-handle[data-handle="n"],
    .resize-handle[data-handle="s"] {
      cursor: ns-resize;
    }

    .resize-handle[data-handle="e"],
    .resize-handle[data-handle="w"] {
      cursor: ew-resize;
    }

    .resize-handle[data-handle="nw"],
    .resize-handle[data-handle="se"] {
      cursor: nwse-resize;
    }

    .resize-handle[data-handle="ne"],
    .resize-handle[data-handle="sw"] {
      cursor: nesw-resize;
    }

    .side {
      padding: 16px;
      align-self: start;
      max-height: calc(100vh - 96px);
      overflow: auto;
      background:
        linear-gradient(180deg, rgba(255, 253, 248, .94), rgba(250, 246, 238, .9)),
        var(--panel);
    }

    .panel-section {
      padding: 16px 0;
      border-bottom: 1px solid rgba(222, 216, 205, .86);
    }

    .panel-section:first-child {
      padding-top: 0;
    }

    .panel-section:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .section-title {
      margin: 0 0 10px;
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 12px;
      color: #554f46;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .section-title::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, .1);
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      background: #ebe4d8;
      padding: 4px;
      border-radius: 8px;
      border: 1px solid rgba(200, 191, 177, .85);
      box-shadow: inset 0 1px 2px rgba(44, 36, 21, .06);
    }

    .segmented button {
      height: 34px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 750;
      font-size: 13px;
    }

    .segmented button.active {
      background: var(--panel);
      color: var(--ink);
      box-shadow: 0 6px 16px rgba(44, 36, 21, .12);
    }

    .field {
      display: grid;
      gap: 7px;
      margin-top: 14px;
    }

    .field label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    input[type="range"] {
      accent-color: var(--accent);
      width: 100%;
      height: 18px;
      cursor: pointer;
      appearance: none;
      background: transparent;
      --range-progress: 50%;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent) 0 var(--range-progress), #e8e0d2 var(--range-progress) 100%);
      border: 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      margin-top: -4px;
      border-radius: 999px;
      background: #fffdf8;
      border: 3px solid var(--accent);
      box-shadow: none;
    }

    input[type="range"]::-moz-range-track {
      height: 8px;
      border-radius: 999px;
      background: #e8e0d2;
      border: 0;
    }

    input[type="range"]::-moz-range-progress {
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border: 3px solid var(--accent);
      border-radius: 999px;
      background: #fffdf8;
      box-shadow: none;
    }

    .text-input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    .text-input {
      width: 100%;
      height: 40px;
      border: 1px solid rgba(200, 191, 177, .86);
      border-radius: 7px;
      background: rgba(255, 253, 248, .88);
      color: var(--ink);
      padding: 0 12px;
      outline: none;
      box-shadow: inset 0 1px 2px rgba(44, 36, 21, .04);
    }

    .text-input:focus {
      border-color: rgba(15, 118, 110, .52);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .12);
      background: #ffffff;
    }

    .color-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 44px;
      gap: 8px;
      align-items: center;
    }

    .color-input {
      width: 44px;
      height: 40px;
      border: 1px solid rgba(200, 191, 177, .86);
      border-radius: 7px;
      background: rgba(255, 253, 248, .88);
      padding: 4px;
      cursor: pointer;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions .primary-button,
    .actions .ghost-button {
      min-height: 42px;
    }

    .actions .primary-button,
    .actions .ghost-button {
      width: 100%;
    }

    .full {
      grid-column: 1 / -1;
    }

    .status {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .meter {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: #e8e0d2;
      border: 1px solid var(--line);
    }

    .meter span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--blue));
      transition: width .2s ease;
    }

    .result-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .result-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fffaf0;
    }

    .result-main {
      min-width: 0;
    }

    .result-type {
      font-weight: 800;
      font-size: 13px;
      line-height: 1.2;
    }

    .result-text {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 210px;
    }

    .mini-button {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      background: rgba(209, 73, 91, .1);
      color: #922235;
      border: 1px solid rgba(209, 73, 91, .24);
    }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--line-strong);
      background: rgba(255, 250, 240, .7);
      border-radius: 8px;
      padding: 14px;
      line-height: 1.6;
      font-size: 13px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      z-index: 40;
      background: var(--ink);
      color: var(--panel);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      box-shadow: 0 14px 34px rgba(0, 0, 0, .22);
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .preview-modal {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(22, 22, 22, .62);
      backdrop-filter: blur(12px);
    }

    .preview-modal.open {
      display: grid;
    }

    .preview-dialog {
      width: min(1120px, 96vw);
      max-height: 92vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: var(--panel);
      border: 1px solid rgba(255, 253, 248, .28);
      border-radius: 8px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, .34);
      overflow: hidden;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .preview-title {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
    }

    .preview-body {
      min-height: 0;
      overflow: auto;
      padding: 16px;
      background:
        linear-gradient(90deg, rgba(22, 22, 22, .04) 1px, transparent 1px),
        linear-gradient(rgba(22, 22, 22, .04) 1px, transparent 1px),
        #f3efe7;
      background-size: 22px 22px;
      display: grid;
      place-items: center;
    }

    .preview-body img {
      display: block;
      max-width: 100%;
      height: auto;
      background: white;
      box-shadow: 0 18px 48px rgba(20, 18, 14, .2);
    }

    @media (max-width: 980px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding: 16px;
      }

      .privacy-note {
        white-space: normal;
      }

      .workspace {
        grid-template-columns: 1fr;
        padding: 12px;
      }

      .stage-shell {
        min-height: 520px;
      }

      .side {
        max-height: none;
      }
    }

    @media (max-width: 620px) {
      .stage-toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .toolbar-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .toolbar-group .file-button,
      .toolbar-group .ghost-button,
      .toolbar-group .primary-button {
        width: 100%;
      }

      .stage {
        padding: 10px;
      }

      .dropzone {
        width: 100%;
        min-height: 310px;
        padding: 24px 16px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 3l7 4v5c0 5-3.5 8-7 9-3.5-1-7-4-7-9V7l7-4z"/><path d="M9.5 12.2l1.7 1.7 3.8-4"/></svg>
        </div>
        <div>
          <h1>隐私截图打码器</h1>
          <p class="tagline">发截图前，一键抹掉敏感信息。</p>
        </div>
      </div>
      <div class="privacy-note">
        <span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-5"/></svg></span>
        图片在浏览器本地处理，不上传服务器
      </div>
    </header>

    <section class="workspace">
      <div class="stage-shell">
        <div class="stage-toolbar">
          <div class="toolbar-group">
            <label class="file-button">

  <div id="previewModal" class="preview-modal" aria-hidden="true">

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const state = {
      image: null,
      fileName: "privacy-screenshot",
      boxes: [],
      watermark: {
        text: "",
        angle: -24,
        opacity: 22,
        fontSize: 36,
        color: "#111111",
        gap: 180
      },
      selectedId: null,
      mode: "mosaic",
      strength: 16,
      manualMode: false,
      drawing: null,
      editing: null,
      applied: false,
      scale: 1,
      nextId: 1
    };

    const fileInput = document.getElementById("fileInput");
    const scanButton = document.getElementById("scanButton");
    const manualButton = document.getElementById("manualButton");
    const undoButton = document.getElementById("undoButton");
    const resetButton = document.getElementById("resetButton");
    const applyButton = document.getElementById("applyButton");
    const downloadButton = document.getElementById("downloadButton");
    const watermarkText = document.getElementById("watermarkText");
    const watermarkAngle = document.getElementById("watermarkAngle");
    const watermarkAngleValue = document.getElementById("watermarkAngleValue");
    const watermarkOpacity = document.getElementById("watermarkOpacity");
    const watermarkOpacityValue = document.getElementById("watermarkOpacityValue");
    const watermarkSize = document.getElementById("watermarkSize");
    const watermarkSizeValue = document.getElementById("watermarkSizeValue");
    const watermarkGap = document.getElementById("watermarkGap");
    const watermarkGapValue = document.getElementById("watermarkGapValue");
    const watermarkColor = document.getElementById("watermarkColor");
    const watermarkColorText = document.getElementById("watermarkColorText");
    const previewModal = document.getElementById("previewModal");
    const previewImageEl = document.getElementById("previewImage");
    const previewCloseButton = document.getElementById("previewCloseButton");
    const imageCloseButton = document.getElementById("imageCloseButton");
    const strengthRange = document.getElementById("strengthRange");
    const strengthValue = document.getElementById("strengthValue");
    const stage = document.getElementById("stage");
    const dropzone = document.getElementById("dropzone");
    const canvasWrap = document.getElementById("canvasWrap");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const overlay = document.getElementById("overlay");
    const statusText = document.getElementById("statusText");
    const progressBar = document.getElementById("progressBar");
    const resultList = document.getElementById("resultList");
    const toast = document.getElementById("toast");

    const iconTrash = '<svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>';

    const patterns = [
      { type: "手机号", regex: /(?<!\d)(?:\+?86[-\s]?)?1[3-9]\d[-\s]?\d{4}[-\s]?\d{4}(?!\d)/g },
      { type: "邮箱", regex: /[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/gi },
      { type: "身份证", regex: /(?<![0-9A-Z])\d{6}(?:18|19|20)\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\d|3[01])\d{3}[\dXx](?![0-9A-Z])/g },
      { type: "银行卡", regex: /(?<!\d)(?:\d[ -]?){15,19}(?!\d)/g },
      { type: "疑似地址", regex: /[\u4e00-\u9fa5]{2,}(?:省|市|区|县|路|街|巷|号|室)[\u4e00-\u9fa50-9A-Za-z-]{0,20}/g }
    ];

    fileInput.addEventListener("change", (event) => {
      const file = event.target.files && event.target.files[0];
      if (file) loadFile(file);
    });

    ["dragenter", "dragover"].forEach((name) => {
      stage.addEventListener(name, (event) => {
        event.preventDefault();
        dropzone.classList.add("dragging");
      });
    });

    ["dragleave", "drop"].forEach((name) => {
      stage.addEventListener(name, (event) => {
        event.preventDefault();
        dropzone.classList.remove("dragging");
      });
    });

    stage.addEventListener("drop", (event) => {
      const file = event.dataTransfer.files && event.dataTransfer.files[0];
      if (file && file.type.startsWith("image/")) loadFile(file);
    });

    document.querySelectorAll('input[type="range"]').forEach((range) => {
      updateRangeProgress(range);
      range.addEventListener("input", () => updateRangeProgress(range));
    });

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => {
        state.mode = button.dataset.mode;
        document.querySelectorAll("[data-mode]").forEach((item) => item.classList.toggle("active", item === button));
        renderCanvasPreview();
      });
    });

    strengthRange.addEventListener("input", () => {
      state.strength = Number(strengthRange.value);
      strengthValue.textContent = String(state.strength);
      renderCanvasPreview();
    });

    scanButton.addEventListener("click", runOcr);
    manualButton.addEventListener("click", toggleManualMode);
    undoButton.addEventListener("click", undoBox);
    resetButton.addEventListener("click", removeImage);
    applyButton.addEventListener("click", openPreviewImage);
    downloadButton.addEventListener("click", downloadImage);
    watermarkText.addEventListener("input", updateWatermarkFromControls);
    watermarkAngle.addEventListener("input", updateWatermarkFromControls);
    watermarkOpacity.addEventListener("input", updateWatermarkFromControls);
    watermarkSize.addEventListener("input", updateWatermarkFromControls);
    watermarkGap.addEventListener("input", updateWatermarkFromControls);
    watermarkColor.addEventListener("input", () => {
      watermarkColorText.value = watermarkColor.value;
      updateWatermarkFromControls();
    });
    watermarkColorText.addEventListener("input", () => {
      if (/^#[0-9a-fA-F]{6}$/.test(watermarkColorText.value.trim())) {
        watermarkColor.value = watermarkColorText.value.trim();
      }
      updateWatermarkFromControls();
    });
    previewCloseButton.addEventListener("click", closePreviewModal);
    previewModal.addEventListener("click", (event) => {
      if (event.target === previewModal) closePreviewModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closePreviewModal();
    });
    imageCloseButton.addEventListener("click", removeImage);
    window.addEventListener("resize", syncOverlayScale);

    overlay.addEventListener("pointerdown", startDrawing);
    overlay.addEventListener("pointermove", updateDrawing);
    overlay.addEventListener("pointerup", finishDrawing);
    overlay.addEventListener("pointercancel", cancelDrawing);
    document.addEventListener("pointermove", updateBoxEdit);
    document.addEventListener("pointerup", finishBoxEdit);
    document.addEventListener("pointercancel", finishBoxEdit);

    function updateRangeProgress(range) {
      const min = Number(range.min || 0);
      const max = Number(range.max || 100);
      const value = Number(range.value || 0);
      const percent = max === min ? 0 : ((value - min) / (max - min)) * 100;
      range.style.setProperty("--range-progress", `${Math.max(0, Math.min(100, percent))}%`);
    }

    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        const image = new Image();
        image.onload = () => {
          const preparedImage = trimTransparentPadding(image);
          state.image = preparedImage;
          state.fileName = file.name.replace(/\.[^.]+$/, "") || "privacy-screenshot";
          state.boxes = [];
          state.watermark.text = "";
          watermarkText.value = "";
          state.selectedId = null;
          state.applied = false;
          state.nextId = 1;
          canvas.width = preparedImage.naturalWidth || preparedImage.width;
          canvas.height = preparedImage.naturalHeight || preparedImage.height;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(preparedImage, 0, 0);
          dropzone.style.display = "none";
          canvasWrap.style.display = "block";
          setStatus("图片已载入。可以手动框选，或点击自动识别。", 0);
          render();
          toastMessage(preparedImage !== image ? "图片已载入，已裁掉透明边缘" : "图片已载入");
        };
        image.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    function trimTransparentPadding(image) {
      const width = image.naturalWidth || image.width;
      const height = image.naturalHeight || image.height;
      const tempCanvas = document.createElement("canvas");
      tempCanvas.width = width;
      tempCanvas.height = height;
      const tempCtx = tempCanvas.getContext("2d", { willReadFrequently: true });
      tempCtx.drawImage(image, 0, 0);
      const pixels = tempCtx.getImageData(0, 0, width, height).data;
      let minX = width;
      let minY = height;
      let maxX = -1;
      let maxY = -1;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const alpha = pixels[(y * width + x) * 4 + 3];
          if (alpha > 8) {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }

      if (maxX < minX || maxY < minY) return image;
      const cropWidth = maxX - minX + 1;
      const cropHeight = maxY - minY + 1;
      const almostSameSize = cropWidth >= width - 2 && cropHeight >= height - 2;
      if (almostSameSize) return image;

      const croppedCanvas = document.createElement("canvas");
      croppedCanvas.width = cropWidth;
      croppedCanvas.height = cropHeight;
      croppedCanvas.getContext("2d").drawImage(tempCanvas, minX, minY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
      return croppedCanvas;
    }

    async function runOcr() {
      if (!state.image) return;
      if (!window.Tesseract) {
        setStatus("OCR 脚本没有加载成功。手动框选仍然可用。", 0);
        toastMessage("OCR 暂不可用");
        return;
      }

      scanButton.disabled = true;
      setStatus("正在本地识别文字...", 8);

      try {
        const result = await Tesseract.recognize(canvas, "chi_sim+eng", {
          logger: (message) => {
            if (message.status === "recognizing text") {
              const percent = Math.round((message.progress || 0) * 100);
              setStatus(`正在识别文字 ${percent}%`, percent);
            } else if (message.status) {
              setStatus(message.status, 12);
            }
          }
        });

        const found = detectSensitiveText(result.data);
        const existingKeys = new Set(state.boxes.map(boxKey));
        const additions = found.filter((box) => !existingKeys.has(boxKey(box)));

        state.boxes.push(...additions.map((box) => ({ ...box, id: state.nextId++ })));
        state.selectedId = additions.length ? state.boxes[state.boxes.length - 1].id : state.selectedId;
        setStatus(additions.length ? `已找到 ${additions.length} 个疑似隐私区域。` : "没有识别到常见敏感信息，可以手动框选。", 100);
        render();
        toastMessage(additions.length ? `找到 ${additions.length} 处` : "未发现候选框");
      } catch (error) {
        console.error(error);
        setStatus("自动识别失败。可以继续使用手动框选。", 0);
        toastMessage("自动识别失败");
      } finally {
        scanButton.disabled = !state.image;
      }
    }

    function detectSensitiveText(data) {
      const lines = Array.isArray(data.lines) && data.lines.length ? data.lines : groupWordsIntoLines(data.words || []);
      const boxes = [];

      for (const line of lines) {
        const text = normalizeText(line.text || "");
        if (!text.trim()) continue;
        for (const pattern of patterns) {
          pattern.regex.lastIndex = 0;
          let match;
          while ((match = pattern.regex.exec(text))) {
            const bbox = getLineBbox(line);
            if (!bbox) continue;
            boxes.push(expandBox({
              x: bbox.x0,
              y: bbox.y0,
              w: bbox.x1 - bbox.x0,
              h: bbox.y1 - bbox.y0,
              type: pattern.type,
              text: maskText(match[0])
            }, 8));
          }
        }
      }

      const words = data.words || [];
      for (const word of words) {
        const text = normalizeText(word.text || "");
        if (!text.trim()) continue;
        for (const pattern of patterns.slice(0, 4)) {
          pattern.regex.lastIndex = 0;
          if (pattern.regex.test(text) && word.bbox) {
            boxes.push(expandBox({
              x: word.bbox.x0,
              y: word.bbox.y0,
              w: word.bbox.x1 - word.bbox.x0,
              h: word.bbox.y1 - word.bbox.y0,
              type: pattern.type,
              text: maskText(text)
            }, 8));
          }
        }
      }

      return mergeBoxes(boxes);
    }

    function groupWordsIntoLines(words) {
      const sorted = words.filter((word) => word.bbox).sort((a, b) => a.bbox.y0 - b.bbox.y0 || a.bbox.x0 - b.bbox.x0);
      const lines = [];
      for (const word of sorted) {
        const centerY = (word.bbox.y0 + word.bbox.y1) / 2;
        let line = lines.find((item) => Math.abs(item.centerY - centerY) < Math.max(12, (word.bbox.y1 - word.bbox.y0) * .8));
        if (!line) {
          line = { words: [], centerY };
          lines.push(line);
        }
        line.words.push(word);
        line.centerY = (line.centerY * (line.words.length - 1) + centerY) / line.words.length;
      }
      return lines.map((line) => ({ ...line, text: line.words.map((word) => word.text).join(" ") }));
    }

    function getLineBbox(line) {
      if (line.bbox) return line.bbox;
      if (!line.words || !line.words.length) return null;
      return line.words.reduce((bbox, word) => ({
        x0: Math.min(bbox.x0, word.bbox.x0),
        y0: Math.min(bbox.y0, word.bbox.y0),
        x1: Math.max(bbox.x1, word.bbox.x1),
        y1: Math.max(bbox.y1, word.bbox.y1)
      }), { x0: Infinity, y0: Infinity, x1: -Infinity, y1: -Infinity });
    }

    function expandBox(box, padding) {
      const x = Math.max(0, Math.round(box.x - padding));
      const y = Math.max(0, Math.round(box.y - padding));
      const w = Math.min(canvas.width - x, Math.round(box.w + padding * 2));
      const h = Math.min(canvas.height - y, Math.round(box.h + padding * 2));
      return { ...box, x, y, w, h };
    }

    function mergeBoxes(boxes) {
      const unique = [];
      for (const box of boxes) {
        const duplicate = unique.find((item) => overlapRatio(item, box) > .62 || boxKey(item) === boxKey(box));
        if (duplicate) {
          duplicate.x = Math.min(duplicate.x, box.x);
          duplicate.y = Math.min(duplicate.y, box.y);
          duplicate.w = Math.max(duplicate.x + duplicate.w, box.x + box.w) - duplicate.x;
          duplicate.h = Math.max(duplicate.y + duplicate.h, box.y + box.h) - duplicate.y;
        } else {
          unique.push(box);
        }
      }
      return unique;
    }

    function overlapRatio(a, b) {
      const left = Math.max(a.x, b.x);
      const top = Math.max(a.y, b.y);
      const right = Math.min(a.x + a.w, b.x + b.w);
      const bottom = Math.min(a.y + a.h, b.y + b.h);
      if (right <= left || bottom <= top) return 0;
      const overlap = (right - left) * (bottom - top);
      return overlap / Math.min(a.w * a.h, b.w * b.h);
    }

    function boxKey(box) {
      return [Math.round(box.x / 8), Math.round(box.y / 8), Math.round(box.w / 8), Math.round(box.h / 8), box.type].join(":");
    }

    function normalizeText(text) {
      return text.replace(/[　]/g, " ").replace(/[—–]/g, "-").trim();
    }

    function maskText(text) {
      if (text.length <= 4) return text;
      return text.slice(0, 2) + "..." + text.slice(-2);
    }

    function toggleManualMode() {
      if (!state.image) return;
      state.manualMode = !state.manualMode;
      manualButton.classList.toggle("primary-button", state.manualMode);
      manualButton.classList.toggle("ghost-button", !state.manualMode);
      overlay.style.pointerEvents = state.manualMode ? "auto" : "none";
      toastMessage(state.manualMode ? "拖动图片添加打码框" : "已关闭手动框选");
    }

    function startDrawing(event) {
      if (!state.manualMode || !state.image || event.target !== overlay) return;
      const point = getCanvasPoint(event);
      state.drawing = { startX: point.x, startY: point.y, x: point.x, y: point.y, w: 0, h: 0 };
      renderOverlay();
      overlay.setPointerCapture(event.pointerId);
    }

    function updateDrawing(event) {
      if (!state.drawing) return;
      const point = getCanvasPoint(event);
      state.drawing.x = Math.min(state.drawing.startX, point.x);
      state.drawing.y = Math.min(state.drawing.startY, point.y);
      state.drawing.w = Math.abs(point.x - state.drawing.startX);
      state.drawing.h = Math.abs(point.y - state.drawing.startY);
      renderOverlay();
    }

    function finishDrawing(event) {
      if (!state.drawing) return;
      const box = state.drawing;
      state.drawing = null;
      if (box.w > 8 && box.h > 8) {
        state.boxes.push({ id: state.nextId++, x: Math.round(box.x), y: Math.round(box.y), w: Math.round(box.w), h: Math.round(box.h), type: "手动框选", text: "自定义区域" });
        state.selectedId = state.boxes[state.boxes.length - 1].id;
        toastMessage("已添加打码框");
      }
      overlay.releasePointerCapture(event.pointerId);
      render();
    }

    function cancelDrawing() {
      state.drawing = null;
      renderOverlay();
    }

    function startBoxEdit(event, id, mode) {
      if (!state.image || event.button !== 0) return;
      const box = state.boxes.find((item) => item.id === id);
      if (!box) return;
      event.preventDefault();
      event.stopPropagation();
      selectBox(id);
      resetCanvasForBoxEditing();
      const point = getCanvasPoint(event);
      state.editing = {
        id,
        mode,
        startX: point.x,
        startY: point.y,
        original: { x: box.x, y: box.y, w: box.w, h: box.h }
      };
    }

    function updateBoxEdit(event) {
      if (!state.editing || !state.image) return;
      const box = state.boxes.find((item) => item.id === state.editing.id);
      if (!box) return;
      const point = getCanvasPoint(event);
      const dx = point.x - state.editing.startX;
      const dy = point.y - state.editing.startY;
      const next = state.editing.mode === "move"
        ? moveBox(state.editing.original, dx, dy)
        : resizeBox(state.editing.original, dx, dy, state.editing.mode);
      Object.assign(box, next);
      renderCanvasPreview();
      renderOverlay();
      renderResults();
    }

    function finishBoxEdit() {
      if (!state.editing) return;
      state.editing = null;
      render();
    }

    function moveBox(box, dx, dy) {
      return {
        x: Math.round(clamp(box.x + dx, 0, canvas.width - box.w)),
        y: Math.round(clamp(box.y + dy, 0, canvas.height - box.h)),
        w: box.w,
        h: box.h
      };
    }

    function resizeBox(box, dx, dy, handle) {
      const minSize = 18;
      let left = box.x;
      let top = box.y;
      let right = box.x + box.w;
      let bottom = box.y + box.h;

      if (handle.includes("w")) left = clamp(box.x + dx, 0, right - minSize);
      if (handle.includes("e")) right = clamp(box.x + box.w + dx, left + minSize, canvas.width);
      if (handle.includes("n")) top = clamp(box.y + dy, 0, bottom - minSize);
      if (handle.includes("s")) bottom = clamp(box.y + box.h + dy, top + minSize, canvas.height);

      return {
        x: Math.round(left),
        y: Math.round(top),
        w: Math.round(right - left),
        h: Math.round(bottom - top)
      };
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function resetCanvasForBoxEditing() {
      renderCanvasPreview();
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: Math.max(0, Math.min(canvas.width, (event.clientX - rect.left) * scaleX)),
        y: Math.max(0, Math.min(canvas.height, (event.clientY - rect.top) * scaleY))
      };
    }

    function selectBox(id) {
      state.selectedId = id;
      renderOverlay();
    }

    function deleteBox(id) {
      state.boxes = state.boxes.filter((box) => box.id !== id);
      if (state.selectedId === id) state.selectedId = null;
      render();
    }

    function undoBox() {
      if (!state.boxes.length) return;
      state.boxes.pop();
      state.selectedId = state.boxes.length ? state.boxes[state.boxes.length - 1].id : null;
      render();
    }

    function removeImage() {
      state.image = null;
      state.fileName = "privacy-screenshot";
      state.boxes = [];
      state.watermark.text = "";
      state.selectedId = null;
      state.applied = false;
      state.manualMode = false;
      state.drawing = null;
      state.editing = null;
      canvas.width = 0;
      canvas.height = 0;
      fileInput.value = "";
      watermarkText.value = "";
      closePreviewModal();
      dropzone.style.display = "grid";
      dropzone.classList.remove("dragging");
      canvasWrap.style.display = "none";
      manualButton.classList.remove("primary-button");
      manualButton.classList.add("ghost-button");
      overlay.style.pointerEvents = "none";
      setStatus("还没有上传图片。", 0);
      render();
      toastMessage("已删除图片");
    }

    function redrawOriginal() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(state.image, 0, 0);
    }

    function openPreviewImage() {
      if (!state.image) return;
      renderCanvasPreview();
      previewImageEl.src = canvas.toDataURL("image/png");
      previewModal.classList.add("open");
      previewModal.setAttribute("aria-hidden", "false");
    }

    function renderCanvasPreview() {
      if (!state.image) return;
      redrawOriginal();
      for (const box of state.boxes) {
        if (state.mode === "black") drawBlack(box);
        if (state.mode === "blur") drawBlur(box);
        if (state.mode === "mosaic") drawMosaic(box);
      }
      drawWatermark();
      state.applied = state.boxes.length > 0 || Boolean(state.watermark.text.trim());
      renderButtons();
    }

    function drawBlack(box) {
      ctx.save();
      ctx.fillStyle = "#111111";
      ctx.fillRect(box.x, box.y, box.w, box.h);
      ctx.restore();
    }

    function drawBlur(box) {
      const temp = document.createElement("canvas");
      temp.width = Math.max(1, box.w);
      temp.height = Math.max(1, box.h);
      const tempCtx = temp.getContext("2d");
      tempCtx.filter = `blur(${Math.max(5, state.strength / 2)}px)`;
      tempCtx.drawImage(canvas, box.x, box.y, box.w, box.h, 0, 0, box.w, box.h);
      ctx.drawImage(temp, box.x, box.y);
    }

    function drawMosaic(box) {
      const size = Math.max(4, state.strength);
      const imageData = ctx.getImageData(box.x, box.y, box.w, box.h);
      for (let y = 0; y < box.h; y += size) {
        for (let x = 0; x < box.w; x += size) {
          const sampleX = Math.min(box.w - 1, x + Math.floor(size / 2));
          const sampleY = Math.min(box.h - 1, y + Math.floor(size / 2));
          const index = (sampleY * box.w + sampleX) * 4;
          ctx.fillStyle = `rgb(${imageData.data[index]}, ${imageData.data[index + 1]}, ${imageData.data[index + 2]})`;
          ctx.fillRect(box.x + x, box.y + y, Math.min(size, box.w - x), Math.min(size, box.h - y));
        }
      }
    }

    function updateWatermarkFromControls() {
      state.watermark.text = watermarkText.value;
      state.watermark.angle = Number(watermarkAngle.value);
      state.watermark.opacity = Number(watermarkOpacity.value);
      state.watermark.fontSize = Number(watermarkSize.value);
      state.watermark.gap = Number(watermarkGap.value);
      state.watermark.color = /^#[0-9a-fA-F]{6}$/.test(watermarkColorText.value.trim()) ? watermarkColorText.value.trim() : watermarkColor.value;
      watermarkAngleValue.textContent = `${state.watermark.angle}°`;
      watermarkOpacityValue.textContent = `${state.watermark.opacity}%`;
      watermarkSizeValue.textContent = String(state.watermark.fontSize);
      watermarkGapValue.textContent = String(state.watermark.gap);
      renderCanvasPreview();
      renderButtons();
    }

    function drawWatermark() {
      const text = state.watermark.text.trim();
      if (!text) return;
      const angle = state.watermark.angle * Math.PI / 180;
      const gap = Math.max(40, state.watermark.gap);
      const bound = Math.hypot(canvas.width, canvas.height);
      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.rotate(angle);
      ctx.globalAlpha = Math.max(0, Math.min(1, state.watermark.opacity / 100));
      ctx.fillStyle = state.watermark.color;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `700 ${state.watermark.fontSize}px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
      for (let y = -bound; y <= bound; y += gap) {
        for (let x = -bound; x <= bound; x += gap * 1.8) {
          ctx.fillText(text, x, y);
        }
      }
      ctx.restore();
    }

    function closePreviewModal() {
      previewModal.classList.remove("open");
      previewModal.setAttribute("aria-hidden", "true");
      previewImageEl.removeAttribute("src");
    }

    function downloadImage() {
      if (!state.image) return;
      renderCanvasPreview();
      const link = document.createElement("a");
      const date = new Date().toISOString().slice(0, 10);
      link.download = `打码_${state.fileName}_${date}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      toastMessage("PNG 已生成");
    }

    function render() {
      renderCanvasPreview();
      syncOverlayScale();
      renderOverlay();
      renderResults();
      renderButtons();
    }

    function syncOverlayScale() {
      if (!state.image) return;
      const rect = canvas.getBoundingClientRect();
      state.scale = rect.width / canvas.width;
      overlay.style.width = `${canvas.width}px`;
      overlay.style.height = `${canvas.height}px`;
      overlay.style.transform = `scale(${state.scale})`;
    }

    function renderOverlay() {
      overlay.innerHTML = "";
      for (const box of state.boxes) {
        const element = document.createElement("div");
        element.className = "redaction-box" + (box.id === state.selectedId ? " active" : "");
        element.style.left = `${box.x}px`;
        element.style.top = `${box.y}px`;
        element.style.width = `${box.w}px`;
        element.style.height = `${box.h}px`;
        element.addEventListener("pointerdown", (event) => {
          if (event.target.closest("button") || event.target.classList.contains("resize-handle")) return;
          startBoxEdit(event, box.id, "move");
        });
        element.addEventListener("click", (event) => {
          event.stopPropagation();
          selectBox(box.id);
        });
        const label = document.createElement("div");
        label.className = "box-label";
        label.textContent = `${box.type} · ${box.text}`;
        element.appendChild(label);
        const closeButton = document.createElement("button");
        closeButton.className = "box-close-button";
        closeButton.type = "button";
        closeButton.title = "删除这个框";
        closeButton.setAttribute("aria-label", "删除这个框");
        closeButton.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>';
        closeButton.addEventListener("click", (event) => {
          event.stopPropagation();
          deleteBox(box.id);
        });
        element.appendChild(closeButton);
        addResizeHandles(element, box.id);
        overlay.appendChild(element);
      }

      if (state.drawing) {
        const element = document.createElement("div");
        element.className = "drawing-box";
        element.style.left = `${state.drawing.x}px`;
        element.style.top = `${state.drawing.y}px`;
        element.style.width = `${state.drawing.w}px`;
        element.style.height = `${state.drawing.h}px`;
        overlay.appendChild(element);
      }
    }

    function addResizeHandles(element, id) {
      const handles = [
        ["nw", "0%", "0%"],
        ["n", "50%", "0%"],
        ["ne", "100%", "0%"],
        ["e", "100%", "50%"],
        ["se", "100%", "100%"],
        ["s", "50%", "100%"],
        ["sw", "0%", "100%"],
        ["w", "0%", "50%"]
      ];

      for (const [handle, left, top] of handles) {
        const node = document.createElement("span");
        node.className = "resize-handle";
        node.dataset.handle = handle;
        node.style.left = left;
        node.style.top = top;
        node.addEventListener("pointerdown", (event) => startBoxEdit(event, id, handle));
        element.appendChild(node);
      }
    }

    function renderResults() {
      resultList.innerHTML = "";
      if (!state.boxes.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = state.image ? "还没有打码框。点击“自动识别”或开启“手动框选”。" : "上传图片后，可以手动框选隐私区域，也可以用自动识别生成候选框。";
        resultList.appendChild(empty);
        return;
      }

      for (const box of state.boxes) {
        const item = document.createElement("div");
        item.className = "result-item";
        item.addEventListener("click", () => selectBox(box.id));
        item.innerHTML = `
          <div class="result-main">
            <div class="result-type">${escapeHtml(box.type)}</div>
            <div class="result-text">${escapeHtml(box.text)}</div>
          </div>
          <button class="mini-button" aria-label="删除">${iconTrash}</button>
        `;
        item.querySelector("button").addEventListener("click", (event) => {
          event.stopPropagation();
          deleteBox(box.id);
        });
        resultList.appendChild(item);
      }
    }

    function renderButtons() {
      const hasImage = Boolean(state.image);
      const hasBoxes = state.boxes.length > 0;
      scanButton.disabled = !hasImage;
      manualButton.disabled = !hasImage;
      undoButton.disabled = !hasBoxes;
      resetButton.disabled = !hasImage;
      applyButton.disabled = !hasImage;
      downloadButton.disabled = !hasImage;
    }

    function setStatus(message, progress) {
      statusText.textContent = message;
      progressBar.style.width = `${Math.max(0, Math.min(100, progress))}%`;
    }

    function toastMessage(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toast.hideTimer);
      toast.hideTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
